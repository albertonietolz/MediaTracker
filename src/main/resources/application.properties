spring.application.name=MediaTracker

# ==========================
# Configuracion SQL (MySQL)
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/mediatracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=mediatracker_user
spring.datasource.password=mediatracker_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================
# Configuracion MongoDB
# ==========================
spring.data.mongodb.uri=mongodb://localhost:27017/mediatracker

# ==========================
# Swagger
# ==========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html